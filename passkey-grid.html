<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passkey as ID — Flujos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0c0c1b;
      --sidebar-w:   228px;
      --card-bg:     #14142a;
      --card-border: rgba(255,255,255,0.07);
      --card-active: #3730a3;
      --card-active-border: #4f46e5;
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.55);
      --text-muted:  rgba(255,255,255,0.3);
      --control-bg:  #14142a;
      --control-border: rgba(255,255,255,0.1);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      color: var(--text-primary);
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      height: 100vh;
      padding: 48px 16px 32px;
      border-right: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      gap: 28px;
      overflow-y: auto;
    }

    .sidebar-header {}

    .sidebar-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .sidebar-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .sidebar-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .proto-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .proto-card {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }

    .proto-card:hover:not(.active) {
      background: #1c1c38;
      border-color: rgba(255,255,255,0.12);
    }

    .proto-card:active { transform: scale(0.98); }

    .proto-card.active {
      background: var(--card-active);
      border-color: var(--card-active-border);
    }

    .proto-card-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .proto-card.active .proto-card-eyebrow {
      color: rgba(255,255,255,0.6);
    }

    .proto-card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 3px;
    }

    .proto-card.active .proto-card-title {
      color: var(--text-primary);
    }

    .proto-card-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .proto-card.active .proto-card-desc {
      color: rgba(255,255,255,0.5);
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0 20px;
      overflow: hidden;
    }

    .breadcrumb {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .breadcrumb strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .viewer {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer visual shell (scaled display size) */
    .phone-scaler {
      border-radius: 18px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.07),
        0 24px 80px rgba(0,0,0,0.75);
      flex-shrink: 0;
      position: relative;
      /* width + height set by JS */
    }

    /* Inner iframe at natural prototype dimensions (360 × 840) */
    .phone-frame {
      width: 360px;
      height: 840px;
      border: none;
      display: block;
      background: #111;
      transform-origin: top left;
      /* transform: scale() set by JS */
    }

    /* Loading overlay */
    .phone-scaler .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .phone-scaler.is-loading .loading {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CONTROLS ── */
    .controls {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      color: var(--text-secondary);
      border-radius: 100px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-appearance: none;
    }

    .btn:hover {
      background: #1e1e3a;
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.18);
    }

    .btn-restart {
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 500;
    }

    .btn-nav {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 14px;
    }

    .btn-nav svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      flex-shrink: 0;
    }

    /* ── GRID TAB ── */
    .grid-tab {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: translateY(-50%) rotate(180deg);
      /* re-implement cleanly */
    }

    /* Right vertical tab */
    .side-tab {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      background: #4f46e5;
      color: #fff;
      border-radius: 8px 0 0 8px;
      cursor: pointer;
      border: none;
      padding: 18px 7px;
      font-family: inherit;
      transition: background 0.15s;
      z-index: 100;
    }

    .side-tab:hover { background: #4338ca; }

    .side-tab-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ── GRID OVERLAY ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 32px 32px 40px;
      overflow-y: auto;
    }

    .grid-overlay.visible { display: flex; }

    .grid-overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 1200px;
      margin-bottom: 32px;
      flex-shrink: 0;
    }

    .grid-overlay-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .btn-close-grid {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      border-radius: 100px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }

    .btn-close-grid:hover {
      background: #1e1e3a;
      color: #fff;
    }

    .grid-cols {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      width: 100%;
      max-width: 1200px;
    }

    .grid-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .grid-cell-label {
      text-align: center;
    }

    .grid-cell-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .grid-cell-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .grid-cell-desc {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .grid-phone {
      width: 100%;
      aspect-ratio: 390 / 844;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.07), 0 16px 48px rgba(0,0,0,0.6);
    }

    .grid-phone iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .btn-open-full {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      color: var(--text-secondary);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-open-full:hover {
      border-color: rgba(255,255,255,0.3);
      color: #fff;
    }

    .btn-open-full svg {
      width: 10px; height: 10px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <p class="sidebar-eyebrow">Passkey as ID</p>
      <h1 class="sidebar-title">Flujos</h1>
      <p class="sidebar-desc">Seleccioná qué variante querés revisar</p>
    </div>

    <div class="proto-list" id="protoList"></div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">
    <p class="breadcrumb" id="breadcrumb"></p>
    <div class="viewer">
      <div class="phone-scaler is-loading" id="phoneScaler">
        <iframe id="protoIframe" class="phone-frame" scrolling="no" title="Prototipo"></iframe>
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-restart" onclick="restartProto()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6a5 5 0 1 0 1-3M1 1v3h3"/></svg>
        Restart
      </button>
      <button class="btn btn-nav" onclick="prevScreen()" title="Pantalla anterior">
        <svg viewBox="0 0 14 14"><polyline points="9,2 4,7 9,12"/></svg>
      </button>
      <button class="btn btn-nav" onclick="nextScreen()" title="Pantalla siguiente">
        <svg viewBox="0 0 14 14"><polyline points="5,2 10,7 5,12"/></svg>
      </button>
    </div>
  </main>

  <!-- ── GRID TAB ── -->
  <button class="side-tab" onclick="openGrid()" title="Ver todos los flujos">
    <span class="side-tab-text">Grid</span>
  </button>

  <!-- ── GRID OVERLAY ── -->
  <div class="grid-overlay" id="gridOverlay">
    <div class="grid-overlay-header">
      <h2 class="grid-overlay-title">Passkey as ID — Comparativa de flujos</h2>
      <button class="btn-close-grid" onclick="closeGrid()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>
        Cerrar
      </button>
    </div>
    <div class="grid-cols" id="gridCols"></div>
  </div>

  <script>
    const PROTOTYPES = [
      {
        id: 1,
        eyebrow: 'Prototipo 1',
        title: 'Happy Path',
        desc: 'Cuenta con Passkey',
        src: 'passkey-as-id-prototype.html',
        breadcrumbLeft: 'Prototipo 1 — Happy Path',
        breadcrumbRight: 'Cuenta con Passkey'
      },
      {
        id: 2,
        eyebrow: 'Prototipo 2',
        title: 'Happy Path',
        desc: 'Múltiples cuentas con Passkey',
        src: 'passkey-as-id-prototype-multicuenta.html',
        breadcrumbLeft: 'Prototipo 2 — Happy Path',
        breadcrumbRight: 'Múltiples cuentas con Passkey'
      },
      {
        id: 3,
        eyebrow: 'Prototipo 3',
        title: 'Sin Passkey',
        desc: 'Enroll en Login',
        src: 'passkey-as-id-prototype-sin-passkey.html',
        breadcrumbLeft: 'Prototipo 3 — Sin Passkey',
        breadcrumbRight: 'Enroll en Login'
      }
    ];

    // Natural prototype dimensions
    const PROTO_W = 360;
    const PROTO_H = 800; // phone frame height

    let currentIndex = 0;
    const iframe   = document.getElementById('protoIframe');
    const scaler   = document.getElementById('phoneScaler');
    const breadcrumb = document.getElementById('breadcrumb');
    const protoList  = document.getElementById('protoList');

    // ── Scale phone to fit available space ──
    function resizePhone() {
      const chrome = 140; // breadcrumb + controls + top/bottom padding
      const maxH = Math.min(760, window.innerHeight - chrome);
      const scale = maxH / PROTO_H;
      const dispW = Math.round(PROTO_W * scale);
      const dispH = Math.round(PROTO_H * scale);

      scaler.style.width  = dispW + 'px';
      scaler.style.height = dispH + 'px';
      iframe.style.transform = `scale(${scale})`;
    }

    window.addEventListener('resize', resizePhone);
    resizePhone();

    // Build sidebar cards
    PROTOTYPES.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'proto-card' + (i === 0 ? ' active' : '');
      card.innerHTML = `
        <p class="proto-card-eyebrow">${p.eyebrow}</p>
        <p class="proto-card-title">${p.title}</p>
        <p class="proto-card-desc">${p.desc}</p>
      `;
      card.addEventListener('click', () => selectProto(i));
      protoList.appendChild(card);
    });

    // Resetea el prototipo embebido a su pantalla inicial (amarilla)
    // · Happy path / Multicuenta: muestra S0 (overlay amarillo) y reinicia su timer
    // · Sin-passkey: vuelve a S1 (amarillo) y deja que goTo(1) reinicie startSplash
    function resetIframeToStart() {
      try {
        const win = iframe.contentWindow;
        const doc = iframe.contentDocument || win.document;

        // ── Volver a S1 (aplica a los tres prototipos) ──
        if (typeof win.goTo === 'function') {
          const scrNum = (typeof win.currentScreen !== 'undefined') ? win.currentScreen
                       : (typeof win.cur !== 'undefined')           ? win.cur
                       : 1;
          if (scrNum > 1) {
            win.goTo(1);
          } else if (typeof win.startSplash === 'function') {
            // Sin-passkey en S1: reiniciar el timer del splash (por si ya fue consumido)
            win.startSplash();
          }
        }

        // ── Happy path / Multicuenta: restaurar S0 (amarillo) ──
        const s0 = doc && doc.getElementById('s0');
        if (s0) {
          // Cancelar timers pendientes de fade
          const t = win._s0t || [null, null];
          clearTimeout(t[0]);
          clearTimeout(t[1]);
          win._s0t = [null, null];

          // Hacer visible S0 sin transición
          s0.style.display = '';
          s0.style.transition = 'none';
          s0.classList.remove('exit');
          s0.style.opacity = '1';

          // Limpiar estilos inline después de un frame para que CSS tome control,
          // luego arrancar el auto-fade (1.3s → desaparece con transición suave)
          setTimeout(() => {
            s0.style.transition = '';
            s0.style.opacity = '';   // el CSS de #s0 ya tiene opacity:1; limpiamos
                                     // el inline para que .exit pueda transicionar a 0
            win._s0t[0] = setTimeout(() => {
              s0.classList.add('exit');          // CSS transiciona opacity: 1 → 0
              win._s0t[1] = setTimeout(() => { s0.style.display = 'none'; }, 520);
            }, 1300);
          }, 50);
        }
      } catch(e) {}
    }

    function selectProto(index) {
      if (index === currentIndex && !scaler.classList.contains('is-loading')) return;
      currentIndex = index;

      // Update sidebar
      document.querySelectorAll('.proto-card').forEach((c, i) => {
        c.classList.toggle('active', i === index);
      });

      // Update breadcrumb
      const p = PROTOTYPES[index];
      breadcrumb.innerHTML = `${p.breadcrumbLeft} · <strong>${p.breadcrumbRight}</strong>`;

      // Load iframe y resetear a pantalla inicial al terminar de cargar
      scaler.classList.add('is-loading');
      iframe.onload = () => {
        scaler.classList.remove('is-loading');
        resizePhone();
        resetIframeToStart();
      };
      iframe.src = p.src;
    }

    function restartProto() {
      resetIframeToStart();
    }

    function prevScreen() {
      try {
        const win = iframe.contentWindow;
        // Soporta tanto "currentScreen" (sin-passkey) como "cur" (happy path / multicuenta)
        const scrNum = (typeof win.currentScreen !== 'undefined') ? win.currentScreen
                     : (typeof win.cur !== 'undefined')           ? win.cur
                     : null;
        if (scrNum && win.goTo) {
          const target = scrNum - 1;
          if (target >= 1) win.goTo(target);
        }
      } catch(e) {}
    }

    function nextScreen() {
      try {
        const win = iframe.contentWindow;
        const scrNum = (typeof win.currentScreen !== 'undefined') ? win.currentScreen
                     : (typeof win.cur !== 'undefined')           ? win.cur
                     : null;
        const total = (typeof win.TOTAL !== 'undefined') ? win.TOTAL : 5;
        if (scrNum && win.goTo) {
          const target = scrNum + 1;
          if (target <= total) win.goTo(target);
        }
      } catch(e) {}
    }

    // Grid overlay
    function openGrid() {
      const gridCols = document.getElementById('gridCols');
      if (!gridCols.hasChildNodes()) {
        PROTOTYPES.forEach(p => {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          cell.innerHTML = `
            <div class="grid-cell-label">
              <p class="grid-cell-eyebrow">${p.eyebrow}</p>
              <p class="grid-cell-title">${p.title}</p>
              <p class="grid-cell-desc">${p.desc}</p>
            </div>
            <div class="grid-phone">
              <iframe src="${p.src}" scrolling="no" loading="lazy" title="${p.title}"></iframe>
            </div>
            <a class="btn-open-full" href="${p.src}" target="_blank">
              <svg viewBox="0 0 12 12"><path d="M7 1h4v4M11 1l-5 5M5 3H2v7h7V7"/></svg>
              Abrir completo
            </a>
          `;
          gridCols.appendChild(cell);
        });
      }
      document.getElementById('gridOverlay').classList.add('visible');
    }

    function closeGrid() {
      document.getElementById('gridOverlay').classList.remove('visible');
    }

    // Init: load first prototype
    selectProto(0);
  </script>
</body>
</html>
